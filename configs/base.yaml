project:
  run_name: "credit_shap_lime"
  random_seed: 42

paths:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  artifacts_dir: "artifacts"

data:
  input_file: "cs-training.csv"
  target_col: "SeriousDlqin2yrs"
  test_size: 0.15
  val_size: 0.15
  id_columns: []

cleaning:
  age_zero_as_missing: true
  delinquency_clip_values: [96, 98]
  delinquency_clip_to: 12
  sensitive_delinquency_median_replace: false

models:
  model_name: "catboost"
  candidate_models: ["logistic", "xgboost", "catboost"]
  class_weight_strategy: "balanced"
  use_smote_in_cv: false
  compare_imbalance_strategies: true
  cv_folds: 5
  tune_hyperparameters: true
  tuning_iterations: 20
  calibrate: true

xgboost:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  tree_method: "hist"

catboost:
  iterations: 600
  depth: 6
  learning_rate: 0.05
  l2_leaf_reg: 3.0
  random_seed: 42
  verbose: false

explain:
  sample_size: 1000
  use_full_test_for_explanations: true
  top_k: 3
  shap_kernel_background_size: 100
  shap_kernel_use_kmeans: true
  lime_num_features: 10
  lime_num_samples: 1000
  lime_num_samples_sweep: [500, 1000, 5000]
  lime_kernel_width: "sqrt_features"
  lime_feature_selection: "auto"
  lime_discretize_continuous: true
  lime_seed_count: 50
  lime_seeds: [11, 19, 37, 71, 97, 101, 103, 107, 109, 113, 127, 131, 137, 139, 149, 151, 157, 163, 167, 173, 179, 181, 191, 193, 197, 199, 211, 223, 227, 229, 233, 239, 241, 251, 257, 263, 269, 271, 277, 281, 283, 293, 307, 311, 313, 317, 331, 337, 347, 349]

stability:
  perturbation_sigma: 0.01
  perturbation_repeats: 3
  bootstrap_samples: 1000

scalability:
  sizes: [1, 10, 50, 100, 300, 500, 1000, 2500, 5000, 10000, 22500]
  repeats: 5
